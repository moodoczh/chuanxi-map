<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>川西北部越野大环 · 宝丹线进（点节点看行程）</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:"Microsoft YaHei","PingFang SC",sans-serif;}
  #wrap{display:flex;height:100%;}
  #map{flex:1;height:100%;background:#e8e8e8;}
  #panel{width:340px;height:100%;overflow-y:auto;background:#fff;box-shadow:-2px 0 8px rgba(0,0,0,.12);-webkit-overflow-scrolling:touch;}
  .ph{position:relative;background:#1F4E79;color:#fff;padding:14px 16px;}
  .ph h1{margin:0;font-size:15px;}
  .ph p{margin:4px 0 0;font-size:11px;opacity:.85;line-height:1.5;}
  .closebtn{display:none;position:absolute;top:10px;right:12px;width:30px;height:30px;line-height:28px;text-align:center;font-size:22px;color:#fff;background:rgba(255,255,255,.18);border-radius:50%;cursor:pointer;}
  #panelToggle{display:none;position:absolute;bottom:18px;right:14px;z-index:1100;background:#1F4E79;color:#fff;border:none;border-radius:22px;padding:10px 16px;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.35);}
  .grip{display:none;width:40px;height:4px;background:rgba(255,255,255,.5);border-radius:3px;margin:0 auto 8px;}
  .pbody{padding:14px 16px;}
  .hint{color:#888;font-size:12px;line-height:1.7;}
  .badge{display:inline-block;color:#fff;font-size:11px;padding:2px 9px;border-radius:11px;margin-bottom:8px;}
  .ptitle{font-size:18px;font-weight:700;color:#1F4E79;margin:2px 0 2px;}
  .psub{font-size:12px;color:#666;margin-bottom:10px;}
  .pdesc{font-size:13px;color:#333;line-height:1.6;background:#f4f8fc;border-left:3px solid #2E75B6;padding:8px 10px;border-radius:4px;margin-bottom:14px;}
  .secttl{font-size:13px;font-weight:700;color:#fff;background:#2E75B6;padding:5px 10px;border-radius:4px;margin:14px 0 8px;}
  table.det{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.det td{border:1px solid #e1e8ef;padding:6px 8px;vertical-align:top;line-height:1.55;}
  table.det td.k{background:#f4f8fc;color:#1F4E79;font-weight:700;width:62px;white-space:nowrap;}
  .stops{font-size:12px;color:#444;margin-top:10px;line-height:1.9;}
  .stops b{color:#1F4E79;}
  .chip{display:inline-block;font-size:11px;padding:1px 7px;border-radius:9px;margin:2px 4px 2px 0;cursor:pointer;color:#fff;}
  .legend{position:absolute;bottom:16px;left:14px;z-index:1000;background:rgba(255,255,255,.97);border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.28);font-size:14px;max-width:280px;overflow:hidden;}
  .legend .lhead{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;padding:10px 13px;font-weight:700;color:#1F4E79;background:#eaf1fb;user-select:none;font-size:14px;}
  .legend .lhead .arrow{transition:transform .2s;font-size:12px;}
  .legend.collapsed .lbody{display:none;}
  .legend.collapsed .lhead .arrow{transform:rotate(-90deg);}
  .legend .lbody{padding:6px 8px 8px;}
  .legend .row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;margin:1px 0;line-height:1.2;}
  .legend .row:hover{background:#f0f4f9;}
  .legend .row.active{background:#1F4E79;color:#fff;font-weight:700;}
  .legend .row.active .sw{box-shadow:0 0 0 2px #fff;}
  .legend .sw{display:inline-block;width:17px;height:17px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 2px #999;flex:none;}
  .legend .rowall{justify-content:center;font-weight:600;color:#2E75B6;border-top:1px solid #e3e9f0;margin-top:4px;padding-top:9px;border-radius:0;}
  .legend .lnote{font-size:11px;color:#b35900;padding:4px 10px 2px;line-height:1.5;}
  @media(max-width:820px){
    #wrap{flex-direction:column;}
    #map{flex:1;height:100%;width:100%;}
    #panel{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;height:74%;
      border-radius:16px 16px 0 0;transform:translateY(103%);transition:transform .28s ease;z-index:1200;}
    #panel.open{transform:translateY(0);}
    .ph{border-radius:16px 16px 0 0;padding-top:10px;}
    .grip{display:block;}
    .closebtn{display:block;}
    #panelToggle{display:block;}
    .legend{font-size:13px;max-width:64%;bottom:12px;left:10px;}
    .legend .sw{width:15px;height:15px;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="map"></div>
  <div id="panel">
    <div class="ph">
      <div class="grip"></div>
      <span class="closebtn" onclick="closePanel()">×</span>
      <h1>川西北部越野大环 · 宝丹线进</h1>
      <p>飞天府机场→龙泉驿取/还车 · 自驾四驱(AT胎) · 7天6晚<br>🚩起=穿越线起点 🏁终=终点 ●=住宿 ◆=途经。右上角切 高德/Google 与 地形/卫星。</p>
    </div>
    <div class="pbody" id="pbody">
      <p class="hint">👈 点地图上任意<b>节点</b>，这里显示对应那天的完整行程（路段 / 里程 / 海拔 / 看点 / 住宿 / 备注）。<br><br>🚩=穿越线起点，🏁=终点，●圆点=过夜地，◆方块=途经/观景点。</p>
    </div>
  </div>
</div>
<div class="legend" id="legend"></div>
<button id="panelToggle" onclick="openPanel()">📋 行程</button>

<script>
// ---------- WGS84 <-> GCJ02 ----------
function outOfChina(lng,lat){return (lng<72.004||lng>137.8347)||(lat<0.8293||lat>55.8271);}
function tLat(x,y){var r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));
  r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;
  r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;
  r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r;}
function tLng(x,y){var r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));
  r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;
  r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;
  r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r;}
function gcj(lng,lat){if(outOfChina(lng,lat))return[lat,lng];
  var a=6378245.0,ee=0.00669342162296594323;
  var dLat=tLat(lng-105,lat-35),dLng=tLng(lng-105,lat-35);
  var rad=lat/180*Math.PI,m=Math.sin(rad);m=1-ee*m*m;var s=Math.sqrt(m);
  dLat=(dLat*180)/((a*(1-ee))/(m*s)*Math.PI);
  dLng=(dLng*180)/(a/s*Math.cos(rad)*Math.PI);
  return [lat+dLat,lng+dLng];}

const dayColors={1:"#888888",2:"#E15759",3:"#F28E2B",4:"#59A14F",5:"#4E79A7",6:"#B07AA1",7:"#9C755F"};
const dayNames={1:"D1 取车→宝兴",2:"D2 宝丹线→丹巴",3:"D3 金金线→金川",4:"D4 情人海·牛肝马肺海",
  5:"D5 毛丹线→小金",6:"D6 四姑娘山→都江堰",7:"D7 还车·返程"};

const dayPlans={
  1:{route:"飞成都天府机场—龙泉驿一专停车场(取车)—成雅高速—宝兴县城(东拉山可顺游)",km:"取车后约 190 km(铺装)",
     elev:"宿宝兴县城约 1,000 m。",sights:"东拉山大峡谷",stay:"宝兴县城(吃住补给加油到位)",
     extra:"优先飞天府机场(离龙泉驿约30km)。中午落地→取车→下午到宝兴。宝兴—中岗(两永线)在施工。"},
  2:{route:"宝丹线：宝兴—中岗村—宝康线—两河口(左拐)—丹巴",km:"约 150–170 km(几乎全非铺装,翻两座 4000m+ 垭口,全天)",
     elev:"宿丹巴约 1,800 m。",sights:"宝康线「四川独库」深谷雪山",stay:"丹巴县城",
     extra:"宝兴城—五龙乡 7:00–20:00 放行、夜间禁行、雨天管制——7点放行就出发。两河口分叉:左丹巴/右小金。"},
  3:{route:"金金线：丹巴太平桥乡—森都垭口—金川增达乡(新金小路黄牌)—金川",km:"约 120 km(含金金线穿越约 78 km)",
     elev:"宿金川约 2,100 m。最高点森都垭口。",sights:"森都垭口、大金川河谷",stay:"金川县城"},
  4:{route:"金川—阿科里乡情人海—毛日乡—牛肝马肺海",km:"约 120 km(土路往返,含徒步约半小时支线)",
     elev:"宿毛日乡约 3,000 m(顺势抬升,为高海拔适应)。情人海3,800m、牛肝马肺海4,300m。",
     sights:"情人海(撒尔脚措)、牛肝马肺海(法螺圣湖)",stay:"毛日乡"},
  5:{route:"毛丹线：毛日乡—热它村—丹东镇—小金县城",km:"约 120–150 km(毛丹线穿越 + 到小金,全天)",
     elev:"宿小金县城约 2,400 m(海拔较低、吃住好,利于恢复)。热它村—毛日间约 4,500 m 垭口。",
     sights:"毛丹线穿越、热它村",stay:"小金县城",
     extra:"⚠ 热它村—毛日段为牧道级烂路(导航常不给行车路线,需用实测GPX);雨季泥泞。热它村可休整/或吃饭。A计划:胎压放1.5–1.8bar、出泥充回,脱困板备手边,设折返点。B计划(深泥/雨中/单车):绕行 金川→丹巴→小金 约170km铺装。"},
  6:{route:"小金—四姑娘山(双桥沟、日隆,逛一逛不过夜)—巴朗山垭口—卧龙—都江堰",km:"约 250 km(巴朗山盘山慢,全天)",
     elev:"宿都江堰约 700 m(下到平原,为次日返程铺垫)。巴朗山垭口约4,480m。",
     sights:"双桥沟、巴朗山垭口、卧龙",stay:"都江堰(临近成都,D7轻松)",
     extra:"四姑娘山只逛不住,当天下到都江堰,把时间留给 D7。"},
  7:{route:"都江堰—成都第二绕城—龙泉驿一专停车场(还车)—天府机场—✈上海浦东",km:"约 90 km(都江堰→龙泉驿约70km + 到机场)",
     elev:"回平原。次日(D8)上班。",sights:"收尾",stay:"上海(当晚抵)",
     extra:"先确认一专停车场傍晚能否收车。建议天府机场 21:00 后晚班机或留足缓冲;天府离龙泉驿约 35km。"},
};

// 概略坐标 WGS84 (lat,lng) —— 仅供示意，非导航精度
const points=[
  {n:"成都(天府机场)",lat:30.3100,lng:104.4400,day:1,alt:"450m",type:"view",d:"全程起终点·进出港"},
  {n:"一专停车场(龙泉驿·取/还车)",lat:30.5600,lng:104.2700,day:1,alt:"500m",type:"start",d:"🚗取/还车点：龙泉驿区南二路301号(D1取车 / D7还车)"},
  {n:"宝兴县城",lat:30.3680,lng:102.8150,day:1,alt:"~1000m",type:"stay",d:"D1宿，进山补给加油"},
  {n:"东拉山大峡谷",lat:30.2700,lng:102.6200,day:1,alt:"~1900m",type:"view",d:"D1顺游"},
  {n:"中岗村(宝丹线起点)",lat:30.5500,lng:102.5500,day:2,alt:"~1500m",type:"start",d:"🚩宝丹线起点"},
  {n:"两河口村",lat:30.7000,lng:101.9800,day:2,alt:"~2600m",type:"view",d:"宝康线分叉：左丹巴/右小金"},
  {n:"丹巴县城(宝丹线终点)",lat:30.8780,lng:101.8900,day:2,alt:"~1800m",type:"end",d:"🏁宝丹线终点；D2宿"},
  {n:"太平桥乡(金金线起点)",lat:30.9300,lng:101.8300,day:3,alt:"~2200m",type:"start",d:"🚩金金线起点(丹巴)"},
  {n:"森都垭口",lat:30.9900,lng:101.7300,day:3,alt:"最高点",type:"view",d:"金金线全程最高点"},
  {n:"增达乡·新金小路(金金线终点)",lat:31.2500,lng:101.8500,day:3,alt:"~2500m",type:"end",d:"🏁金金线终点(金川)，乡口黄色路牌"},
  {n:"金川县城",lat:31.4800,lng:102.0700,day:3,alt:"~2100m",type:"stay",d:"D3宿"},
  {n:"阿科里·情人海",lat:31.6000,lng:101.7200,day:4,alt:"3800m",type:"view",d:"撒尔脚措/长海子"},
  {n:"毛日乡",lat:31.4800,lng:101.5800,day:4,alt:"~3000m",type:"stay",d:"D4宿；毛丹线起点；牛肝马肺海前哨"},
  {n:"牛肝马肺海",lat:31.4300,lng:101.5200,day:4,alt:"4300m",type:"view",d:"壳它村，徒步约半小时支线(往返)"},
  {n:"热它村",lat:31.1500,lng:101.9500,day:5,alt:"~3500m",type:"view",d:"毛丹线途经，休整点(或可吃饭)；热它—毛日间约4500m垭口"},
  {n:"丹东镇(毛丹线终点)",lat:30.9700,lng:102.2000,day:5,alt:"~2900m",type:"end",d:"🏁毛丹线终点(小金侧)，继续到小金县城"},
  {n:"小金县城",lat:30.9980,lng:102.3630,day:5,alt:"~2400m",type:"stay",d:"D5宿(海拔较低、吃住好,利于恢复)"},
  {n:"双桥沟",lat:31.1000,lng:102.8000,day:6,alt:"~3000m",type:"view",d:"四姑娘山景区，逛一逛"},
  {n:"四姑娘山镇(日隆)",lat:31.0000,lng:102.8600,day:6,alt:"~3200m",type:"view",d:"逛一逛不过夜"},
  {n:"巴朗山垭口",lat:30.8800,lng:102.9000,day:6,alt:"~4480m",type:"view",d:"观景，出山"},
  {n:"卧龙",lat:30.9800,lng:103.1800,day:6,alt:"~1900m",type:"view",d:"熊猫基地，途经"},
  {n:"都江堰",lat:30.9900,lng:103.6200,day:6,alt:"~700m",type:"stay",d:"D6宿(临近成都，D7轻松)"},
];
points.forEach(p=>{const g=gcj(p.lng,p.lat);p.glat=g[0];p.glng=g[1];});
const byName={};points.forEach(p=>byName[p.n]=p);

const routeOrder=["成都(天府机场)","一专停车场(龙泉驿·取/还车)","宝兴县城","中岗村(宝丹线起点)","两河口村",
  "丹巴县城(宝丹线终点)","太平桥乡(金金线起点)","森都垭口","增达乡·新金小路(金金线终点)","金川县城",
  "阿科里·情人海","毛日乡","热它村","丹东镇(毛丹线终点)","小金县城",
  "双桥沟","四姑娘山镇(日隆)","巴朗山垭口","卧龙","都江堰","一专停车场(龙泉驿·取/还车)","成都(天府机场)"];

// ---------- 底图：高德(GCJ02,默认) + Google(WGS84) ----------
const map=L.map('map');
const aVec=L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=7&x={x}&y={y}&z={z}',{subdomains:"1234",maxZoom:18,attribution:'© 高德地图'}).addTo(map);
const aSat=L.layerGroup([
  L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:"1234",maxZoom:18}),
  L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:"1234",maxZoom:18})
]);
const gTerrain=L.tileLayer('https://mt{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}&hl=zh-CN',{subdomains:"0123",maxZoom:20,attribution:'© Google 地形'});
const gSat=L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{subdomains:"0123",maxZoom:20,attribution:'© Google 卫星'});
const gHybrid=L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=zh-CN',{subdomains:"0123",maxZoom:20,attribution:'© Google 混合'});
L.control.layers({"高德 地图":aVec,"高德 卫星":aSat,"Google 地形":gTerrain,"Google 卫星":gSat,"Google 卫星+标注":gHybrid}).addTo(map);
const gcjLayers=new Set([aVec,aSat]);
let mode='gcj';
function LL(p){return mode==='gcj'?[p.glat,p.glng]:[p.lat,p.lng];}

const featureLayer=L.layerGroup().addTo(map);
const markerRef={};
function squareIcon(col){return L.divIcon({className:"",html:`<div style="width:14px;height:14px;background:${col};border:2px solid #fff;border-radius:3px;box-shadow:0 0 3px #555;transform:rotate(45deg)"></div>`,iconSize:[14,14],iconAnchor:[7,7]});}
function flagIcon(col,txt){return L.divIcon({className:"",html:`<div style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;background:${col};border:2px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 0 4px #444"><span style="transform:rotate(45deg);color:#fff;font-size:10px;font-weight:700">${txt}</span></div>`,iconSize:[20,20],iconAnchor:[10,18]});}
function labelIcon(txt){return L.divIcon({className:"",html:`<div style="font-size:11px;color:#fff;font-weight:600;text-shadow:0 0 3px #000,0 0 3px #000,0 0 3px #000;white-space:nowrap;margin-left:13px;margin-top:-8px">${txt}</div>`,iconSize:[0,0]});}

let activeDay=null;
function segStyle(day){
  if(activeDay===null) return {color:dayColors[day]||"#666",weight:4,opacity:.85};
  if(String(day)===String(activeDay)) return {color:dayColors[day]||"#666",weight:6,opacity:1};
  return {color:"#9aa3ab",weight:2,opacity:.28};
}
function drawFeatures(){
  featureLayer.clearLayers();
  for(let i=0;i<routeOrder.length-1;i++){
    const a=byName[routeOrder[i]],b=byName[routeOrder[i+1]];
    const st=segStyle(b.day);
    featureLayer.addLayer(L.polyline([LL(a),LL(b)],{color:st.color,weight:st.weight,opacity:st.opacity,dashArray:(a.day===1||b.day===7)?"8,8":null}));
  }
  // 牛肝马肺海 徒步支线(D4)
  { const st=segStyle(4); featureLayer.addLayer(L.polyline([LL(byName["毛日乡"]),LL(byName["牛肝马肺海"])],{color:st.color,weight:Math.max(2,st.weight-1),opacity:st.opacity,dashArray:"4,6"})); }
  // D5 雨天B计划绕行(归到D5)
  { const dim=activeDay!==null&&String(activeDay)!=="5";
    featureLayer.addLayer(L.polyline([LL(byName["金川县城"]),LL(byName["丹巴县城(宝丹线终点)"]),LL(byName["小金县城"])],
      {color:dim?"#c8ccd0":"#999",weight:(String(activeDay)==="5")?4:3,opacity:dim?.28:.7,dashArray:"2,7"})); }
  points.forEach(p=>{
    const dim=activeDay!==null&&String(p.day)!==String(activeDay);
    const op=dim?.35:1;const col=dayColors[p.day];let m;
    if(p.type==="stay") m=L.circleMarker(LL(p),{radius:9,color:"#fff",weight:2,fillColor:col,fillOpacity:op,opacity:op});
    else if(p.type==="start") m=L.marker(LL(p),{icon:flagIcon(col,"起"),opacity:op});
    else if(p.type==="end") m=L.marker(LL(p),{icon:flagIcon(col,"终"),opacity:op});
    else m=L.marker(LL(p),{icon:squareIcon(col),opacity:op});
    m.on('click',()=>showPanel(p));
    m.bindTooltip(p.n,{direction:'right',offset:[12,0]});
    featureLayer.addLayer(m);markerRef[p.n]=m;
    if(activeDay===null||String(p.day)===String(activeDay)){
      featureLayer.addLayer(L.marker(LL(p),{icon:labelIcon(p.n),opacity:op}));
    }
  });
}
function setActiveDay(d){
  activeDay=(d===null||String(activeDay)===String(d))?null:d;
  drawFeatures();updateLegendActive();
  if(activeDay!==null){
    const pts=points.filter(x=>String(x.day)===String(activeDay)).map(x=>LL(x));
    if(pts.length)map.fitBounds(pts,{padding:[60,60],maxZoom:11});
    showDay(activeDay);
  } else { fitAll(); panelHint(); }
}
function detTable(pl){
  return `<table class="det">
    <tr><td class="k">路段</td><td>${pl.route}</td></tr>
    <tr><td class="k">参考里程</td><td>${pl.km}</td></tr>
    <tr><td class="k">海拔</td><td>${pl.elev}</td></tr>
    <tr><td class="k">核心看点</td><td>${pl.sights}</td></tr>
    <tr><td class="k">住宿</td><td>${pl.stay}</td></tr>
    ${pl.extra?`<tr><td class="k">备注</td><td style="color:#b35900">${pl.extra}</td></tr>`:""}
  </table>`;
}
function showDay(d){
  const pl=dayPlans[d];const col=dayColors[d];
  const sameDay=points.filter(x=>String(x.day)===String(d));
  const chips=sameDay.map(x=>`<span class="chip" style="background:${col}" onclick="window.__sel('${x.n.replace(/'/g,"")}')">${x.n}</span>`).join("");
  let html=`<span class="badge" style="background:${col}">${dayNames[d]}</span>`;
  html+=`<div class="ptitle">${dayNames[d]}</div>`;
  html+=`<div class="psub">点下方地点名可在地图定位</div>`;
  html+=`<div class="secttl">本日完整安排</div>`+detTable(pl);
  html+=`<div class="stops"><b>本日相关点：</b><br>${chips}</div>`;
  document.getElementById('pbody').innerHTML=html;
  if(window.matchMedia('(max-width:820px)').matches){openPanel();document.getElementById('pbody').scrollTop=0;}
}
function panelHint(){
  document.getElementById('pbody').innerHTML=`<p class="hint">👈 点地图节点，或点图例里的某一天，这里就显示当天完整行程。<br><br>🚩=穿越线起点，🏁=终点，●圆点=过夜地，◆方块=途经/观景点。</p>`;
}
map.on('baselayerchange',e=>{mode=gcjLayers.has(e.layer)?'gcj':'wgs';drawFeatures();});

function showPanel(p){
  const pl=dayPlans[p.day];const col=dayColors[p.day];
  const sameDay=points.filter(x=>x.day===p.day);
  const chips=sameDay.map(x=>`<span class="chip" style="background:${col}" onclick="window.__sel('${x.n.replace(/'/g,"")}')">${x.n}</span>`).join("");
  let roleTxt=p.type==="stay"?"🛏 过夜地":(p.type==="start"?"🚩 起点/取还车":(p.type==="end"?"🏁 穿越线终点":"◆ 途经/观景点"));
  let html=`<span class="badge" style="background:${col}">${dayNames[p.day]}</span>`;
  html+=`<div class="ptitle">${p.n}</div>`;
  html+=`<div class="psub">海拔约 ${p.alt} · ${roleTxt}</div>`;
  html+=`<div class="pdesc">${p.d}</div>`;
  html+=`<div class="secttl">本日完整安排</div>`;
  html+=`<table class="det">
    <tr><td class="k">路段</td><td>${pl.route}</td></tr>
    <tr><td class="k">参考里程</td><td>${pl.km}</td></tr>
    <tr><td class="k">海拔</td><td>${pl.elev}</td></tr>
    <tr><td class="k">核心看点</td><td>${pl.sights}</td></tr>
    <tr><td class="k">住宿</td><td>${pl.stay}</td></tr>
    ${pl.extra?`<tr><td class="k">备注</td><td style="color:#b35900">${pl.extra}</td></tr>`:""}
  </table>`;
  html+=`<div class="stops"><b>本日相关点：</b><br>${chips}</div>`;
  const g=`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
  const a=`https://uri.amap.com/marker?position=${p.glng},${p.glat}&name=${encodeURIComponent(p.n)}&coordinate=gaode`;
  html+=`<div style="margin-top:12px;font-size:12px"><a href="${a}" target="_blank" style="color:#2E75B6;font-weight:600">→ 高德地图</a> &nbsp;|&nbsp; <a href="${g}" target="_blank" style="color:#2E75B6;font-weight:600">→ Google地图</a></div>`;
  document.getElementById('pbody').innerHTML=html;
  if(window.matchMedia('(max-width:820px)').matches){document.getElementById('panel').classList.add('open');document.getElementById('pbody').scrollTop=0;}
}
function openPanel(){document.getElementById('panel').classList.add('open');}
function closePanel(){document.getElementById('panel').classList.remove('open');}
window.__sel=(name)=>{const p=byName[name];if(p){map.setView(LL(p),Math.max(map.getZoom(),10));showPanel(p);}};

drawFeatures();
function fitAll(){map.fitBounds(points.map(p=>[p.lat,p.lng]),{padding:[40,40]});}
fitAll();
let _rt;window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(()=>{map.invalidateSize();fitAll();},250);});
window.addEventListener('orientationchange',()=>{setTimeout(()=>{map.invalidateSize();fitAll();},400);});

const lg=document.getElementById('legend');
function buildLegend(){
  let h=`<div class="lhead" onclick="toggleLegend()"><span>按天图例 · 点击高亮</span><span class="arrow">▾</span></div><div class="lbody">`;
  Object.keys(dayNames).forEach(d=>{
    h+=`<div class="row" id="lg-${d}" onclick="setActiveDay('${d}')"><span class="sw" style="background:${dayColors[d]}"></span>${dayNames[d]}</div>`;
  });
  h+=`<div class="row rowall" onclick="setActiveDay(null)">↺ 显示全部路线</div>`;
  h+=`<div class="lnote">🚩起 🏁终 ●住宿 ◆途经 · 灰虚线=D5雨天绕行 · 坐标概略，导航用GPX</div>`;
  h+=`</div>`;
  lg.innerHTML=h;
}
function updateLegendActive(){
  Object.keys(dayNames).forEach(d=>{const el=document.getElementById('lg-'+d);if(el)el.classList.toggle('active',String(activeDay)===String(d));});
}
function toggleLegend(){lg.classList.toggle('collapsed');}
buildLegend();
</script>
</body>
</html>
